# Showcase Video Configuration
# 
# This file defines the source video folders for each category.
# After editing this file, run:
#   python scripts/process_showcase_videos.py
#
# Format:
#   category_name:
#     mode: "multi" (RGB+Depth+Seg with camera views) or "single" (single video per scene)
#     scenes:
#       - src: "path/to/source/scene_trajectory"   # Source folder containing videos
#         name: "optional_display_name"            # Optional: custom display name
#
# For "multi" mode, the source folder should contain:
#   - {sceneName}_camera0.mp4, {sceneName}_camera0_depth.mp4, {sceneName}_camera0_seg.mp4
#   - {sceneName}_camera1.mp4, ... etc.
#
# For "single" mode, videos are copied directly without RGB/Depth/Seg split.

